<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
</head>
<style>
    .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #2244ca;
    padding: 10px 20px;
    color: #fff;
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

img {
    height: 40px;
    border-radius: 20%;
}

.nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
}

.nav-links li {
    position: relative;
}

.nav-links a {
    text-decoration: none;
    color: #fff;
    font-weight: 500;
    padding: 5px 10px;
}

.nav-links a:hover {
    background-color: #fff;
    color: #2244ca;
    border-radius: 5px;
    transition: 0.3s;
}

button {
    background-color: #fff;
    color: #2244ca;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 500;
}
button:hover {
    background-color: #2244ca;
    color: #fff;
    border: 2px solid #fff;
    transition: 0.3s;
}
</style>
<body>
        <!-- NAVIGATION -->
            <nav class="navbar">

                <div class="logo">
                    <img src="placeholderimage" alt="Logo">
                </div>

                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <button class="btn">Sign Up</button>
            </nav>
</body>
</html>
