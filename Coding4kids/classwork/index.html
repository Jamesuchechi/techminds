<body>
    <h1>Personal Information Form</h1>
    <p>
        Please fill out the form below to provide your personal information.
    </p>
    <h2>Exercise 1: Basic HTML Structure</h2>
    <p>

    <form action="/submit" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>

        <fieldset>
            <legend>Gender</legend>
            <label for="male">Male</label>
            <input type="radio" id="male" name="gender" value="male"><br>
            <label for="female">Female</label>
            <input type="radio" id="female" name="gender" value="female"><br>
            <label for="other">Other</label>
            <input type="radio" id="other" name="gender" value="other">
        </fieldset>

        <fieldset>
            <legend>Interests</legend>
            <label for="sports">Sports</label>
            <input type="checkbox" id="sports" name="interests" value="sports"><br>
            <label for="music">Music</label>
            <input type="checkbox" id="music" name="interests" value="music"><br>
            <label for="books">Books</label>
            <input type="checkbox" id="books" name="interests" value="books">
        </fieldset>
        <input type="submit" value="Register">
    </form>   
</body>
