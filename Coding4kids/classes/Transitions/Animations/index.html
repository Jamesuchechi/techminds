<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations Lesson</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Animations with @keyframes</h1>
    <p>Examples of animation-name, duration, iteration-count, and direction.</p>

    <!-- Example 1 -->
    <section>
        <h2>1. Moving Box</h2>
        <div class="box move"></div>
    </section>

    <!-- Example 2 -->
    <section>
        <h2>2. Color Changing Box</h2>
        <div class="box color"></div>
    </section>

    <!-- Example 3 -->
    <section>
        <h2>3. Rotating Box</h2>
        <div class="box rotate"></div>
    </section>

    <!-- Example 4 -->
    <section>
        <h2>4. Bouncing Ball</h2>
        <div class="ball"></div>
    </section>

    <!-- Example 5 -->
    <section>
        <h2>5. Loading Spinner</h2>
        <div class="spinner"></div>
    </section>

    <!-- Example 6 -->
    <section>
        <h2>6. Floating Card</h2>
        <div class="card">
            Floating Card
        </div>
    </section>

    <!-- Example 7 -->
    <section>
        <h2>7. Pulse Button</h2>
        <button class="pulse-btn">
            Subscribe
        </button>
    </section>

    <!-- Example 8 -->
    <section>
        <h2>8. Animation Directions</h2>

        <div class="direction-container">

            <div class="box normal">
                Normal
            </div>

            <div class="box reverse">
                Reverse
            </div>

            <div class="box alternate">
                Alternate
            </div>

        </div>
    </section>

</body>
</html>
