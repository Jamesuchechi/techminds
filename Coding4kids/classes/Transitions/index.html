<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS Transition Demo</h1>
    <h2>Example 1 - Button</h2>
    <button class="btn">
        Hover me
    </button>

    <h2>Example 2 - Box</h2>

    <div class="card">

        <p>
            Hover over this card to see multiple transitions
        </p>
    </div>

</html>
